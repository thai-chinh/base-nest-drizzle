syntax = "proto3";

package face;

service FaceService {
  rpc ExtractFace (ExtractFaceRequest) returns (ExtractFaceResponse);
}

message ExtractFaceRequest {
  bytes file = 1;
  string filename = 2;
  string content_type = 3;
  optional float det_threshold = 4;
  string mode = 5; // "TRAINING" | "DETECT"
}

message FaceModelInfo {
  string name = 1;
  string version = 2;
  int32 dim = 3;
  bool normalized = 4;
}

message FaceExtractionResult {
  repeated float embedding = 1;
  repeated float bbox = 2;
  float det_score = 3;
  FaceModelInfo model = 4;
  string created_at = 5; // ISO-8601
}

message VideoMetadata {
  int32 total_frames = 1;
  int32 valid_frames = 2;
  int32 unique_embeddings = 3;
}

message ExtractFaceResponse {
  repeated FaceExtractionResult results = 1;
  optional VideoMetadata video_metadata = 2;
}
